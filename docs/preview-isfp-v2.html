<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ISFP v2 — 色彩故事</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDFBF7;
  --pa:#7A9E8E;
  --pb:#C4856A;
  --pc:#B5A882;
  --pd:#8B7BAB;
  --pe:#6B9E7E;
  --text:#2A2018;
  --text2:#8A7A6A;
  --font:-apple-system,"Helvetica Neue","PingFang SC",sans-serif;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.card{width:600px;margin:0 auto;background:var(--bg);padding:40px 40px 36px}

.eyebrow{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:28px}

/* Color palette grid */
.palette{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.palette-item{display:flex;flex-direction:column;gap:0}
.swatch{border-radius:6px;height:88px;position:relative}
.swatch-label{
  padding:10px 12px;
  font-size:12px;color:var(--text2);line-height:1.5;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.swatch-label strong{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}

/* Wide swatch */
.palette-wide{grid-column:1/-1}
.palette-wide .swatch{height:60px}

/* Overall reading */
.reading{
  margin-top:8px;padding:18px 20px;
  border-top:1px solid rgba(0,0,0,0.06);
}
.reading-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.reading-text{font-size:13px;color:var(--text2);line-height:1.8;font-style:italic}

.footer-meta{margin-top:16px;font-size:10px;color:var(--text2);letter-spacing:.04em}
</style>
</head>
<body>
<div class="card">

  <div class="eyebrow">色彩故事 · 色彩叙事式</div>

  <div class="palette">

    <div class="palette-item">
      <div class="swatch" style="background:var(--pa)"></div>
      <div class="swatch-label">
        <strong>Select</strong>
        克制的蓝绿——只留必要的
      </div>
    </div>

    <div class="palette-item">
      <div class="swatch" style="background:var(--pb)"></div>
      <div class="swatch-label">
        <strong>Compress</strong>
        暖赭石——保留温度的精简
      </div>
    </div>

    <div class="palette-item">
      <div class="swatch" style="background:var(--pd)"></div>
      <div class="swatch-label">
        <strong>Isolate</strong>
        柔紫——给思维留一个边界
      </div>
    </div>

    <div class="palette-item">
      <div class="swatch" style="background:var(--pe)"></div>
      <div class="swatch-label">
        <strong>Write</strong>
        苔藓绿——让记忆长在土里
      </div>
    </div>

    <div class="palette-item palette-wide">
      <div class="swatch" style="background:var(--pc)"></div>
      <div class="swatch-label">
        <strong>Context Drift</strong>
        暖沙色——不知不觉的漂移，像时间的颜色
      </div>
    </div>

  </div>

  <div class="reading">
    <div class="reading-label">这些颜色在说</div>
    <div class="reading-text">
      管理上下文，不是在做减法——<br>
      是在为每一种颜色找到它应该待的地方。
    </div>
  </div>

  <div class="footer-meta">原文：Context Engineering · via readable-and-shareable</div>

</div>
</body>
</html>
